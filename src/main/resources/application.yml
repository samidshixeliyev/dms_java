spring:
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:dms_new};encrypt=false;trustServerCertificate=true;loginTimeout=30
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.SQLServerDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dms-secret-key-change-in-production-must-be-at-least-256-bits-long-xxxx}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  storage:
    base-path: ${STORAGE_PATH:/app/storage}
  mail:
    from: ${MAIL_FROM:noreply@dms.local}

logging:
  level:
    com.dms: INFO
    org.springframework.security: WARN
